<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Heartlux app preview</title>
  <desc id="desc">Preview image showing the Heartlux dating app interface with profile cards, matching statistics, and controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff9fb"/>
      <stop offset="0.55" stop-color="#f7f7fb"/>
      <stop offset="1" stop-color="#eef8f4"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e84b9a"/>
      <stop offset="1" stop-color="#cc328c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#2d1b2e" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="92" y="68" width="1096" height="584" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="92" y="68" width="1096" height="76" rx="28" fill="#2d1b2e"/>
  <text x="140" y="118" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Heartlux</text>
  <text x="872" y="116" font-family="Arial, sans-serif" font-size="18" fill="#f8d7e8">Home   Discover   Matches</text>
  <circle cx="1118" cy="105" r="20" fill="#cc328c"/>
  <text x="1110" y="113" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">♥</text>

  <text x="150" y="232" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="#2d1b2e">Where meaningful</text>
  <text x="150" y="296" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="#2d1b2e">connections flow.</text>
  <text x="154" y="344" font-family="Arial, sans-serif" font-size="22" fill="#6d6070">A responsive social discovery app with</text>
  <text x="154" y="374" font-family="Arial, sans-serif" font-size="22" fill="#6d6070">matching, profiles, chat, i18n, and dark mode.</text>
  <rect x="154" y="420" width="190" height="52" rx="26" fill="url(#heart)"/>
  <text x="194" y="454" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Start Discovering</text>
  <rect x="360" y="420" width="148" height="52" rx="26" fill="#ffffff" stroke="#cc328c" stroke-width="3"/>
  <text x="394" y="454" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#cc328c">Join</text>

  <rect x="680" y="190" width="320" height="410" rx="28" fill="#ffffff" stroke="#f0d7e6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="704" y="214" width="272" height="210" rx="24" fill="url(#heart)"/>
  <circle cx="840" cy="310" r="66" fill="#fff0f7"/>
  <text x="803" y="334" font-family="Arial, sans-serif" font-size="72" fill="#cc328c">♥</text>
  <text x="724" y="470" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#2d1b2e">Sofia, 26</text>
  <text x="724" y="506" font-family="Arial, sans-serif" font-size="18" fill="#6d6070">Stockholm · Music · Travel</text>
  <rect x="724" y="536" width="116" height="34" rx="17" fill="#fff1f8"/>
  <text x="746" y="559" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#cc328c">92% match</text>
  <circle cx="1036" cy="374" r="44" fill="#ffffff" stroke="#cc328c" stroke-width="3"/>
  <text x="1017" y="389" font-family="Arial, sans-serif" font-size="42" fill="#cc328c">♥</text>
  <circle cx="638" cy="374" r="44" fill="#ffffff" stroke="#6d6070" stroke-width="3"/>
  <text x="623" y="389" font-family="Arial, sans-serif" font-size="36" fill="#6d6070">×</text>

  <rect x="1018" y="228" width="88" height="58" rx="16" fill="#f3fbf8"/>
  <text x="1040" y="252" font-family="Arial, sans-serif" font-size="14" fill="#6d6070">Likes</text>
  <text x="1044" y="276" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#2d1b2e">12</text>
  <rect x="1018" y="306" width="88" height="58" rx="16" fill="#fff1f8"/>
  <text x="1030" y="330" font-family="Arial, sans-serif" font-size="14" fill="#6d6070">Matches</text>
  <text x="1048" y="354" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#2d1b2e">4</text>
</svg>
